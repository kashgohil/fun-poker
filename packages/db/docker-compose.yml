services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    ports:
      - '5432:5432'
    volumes:
      - poker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U poker -d poker']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  poker_pgdata:
